services:
  # Python backend API service
  - type: web
    name: aurora-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt && pip install numpy pandas scikit-learn && python backend/app/seed.py && python ml/train.py
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aurora-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: aurora-cache
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # React SPA Static Frontend
  - type: web
    name: aurora-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# Managed Database services
databases:
  - name: aurora-db
    plan: free

# Managed Redis services
interfaces:
  - type: redis
    name: aurora-cache
    plan: free
    ipAllowList: [] # Allow internal access only
