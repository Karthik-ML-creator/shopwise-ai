[build]
builder = "NIXPACKS"
buildCommand = "pip install -r backend/requirements.txt && pip install numpy pandas scikit-learn && python backend/app/seed.py && python ml/train.py"

[deploy]
startCommand = "uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[env]
PYTHONUNBUFFERED = "1"
PORT = "8080"
